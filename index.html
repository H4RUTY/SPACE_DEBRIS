<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>src</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- start screen -->
    <div id="start-screen">
        <div id="start-screen-box">
            <h1 id="title">SPACE DEBRIS</h1>
            <p style="text-align: center;">Connect your gamepad and press START to begin</p>
        </div>
    </div>

    <!-- game ui -->
    <div id="game"></div>

    <div id="count-container">
        <div class="indicator-child">
            <p style="width: 100px;">Life:</p>
            <p id="life-indicator" style="font-size: 15px;"></p>
        </div>
        <div class="indicator-child">
            <p style="width: 100px;">Debris Destructions:</p>
            <p id="dd-indicator" style="font-size: 15px;"></p>
        </div>
    </div>

    <div id="cooltime-container">
        <div class="indicator-child">
            <p class="indicator-label">Dash:</p>
            <canvas id="dash-indicator" width="200" height="10"></canvas>
        </div>
        <div class="indicator-child">
            <p class="indicator-label">Barrier:</p>
            <canvas id="barrier-indicator" width="200" height="10"></canvas>
        </div>
        <div class="indicator-child">
            <p class="indicator-label">Guardian:</p>
            <canvas id="guardian-indicator" width="200" height="10"></canvas>
        </div>
        <div class="indicator-child">
            <p class="indicator-label">Invisible:</p>
            <canvas id="invisible-indicator" width="200" height="10"></canvas>
        </div>
        <div class="indicator-child">
            <p class="indicator-label">Dwarf:</p>
            <canvas id="dwarf-indicator" width="200" height="10"></canvas>
        </div>
        <div class="indicator-child">
            <p class="indicator-label">Gun:</p>
            <canvas id="gun-indicator" width="200" height="10"></canvas>
        </div>
        <div class="indicator-child">
            <p class="indicator-label">Slo-mo:</p>
            <canvas id="slo-mo-indicator" width="200" height="10"></canvas>
        </div>
        <div class="indicator-child">
            <p class="indicator-label">Time Warp:</p>
            <canvas id="timewarp-indicator" width="200" height="10"></canvas>
        </div>
    </div>

    <div id="gravity-indicator-container">
        <canvas id="gravity-indicator" width="100" height="100"></canvas>
        <p style="width: 100%; text-align: center;">Gravity Indicator</p>
    </div>

    <div id="log"></div>

    <!-- game over screen -->
    <div id="game-over">
        <h1 id="game-over-title">GAME OVER...</h1>
        <h2 id="score" style="text-align: center; font-size: 20px;"></h2>
        <p style="text-align: center;">Press START to restart</p>
    </div>

    <!-- js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
